name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Sync dev deps
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        crdb: ["latest-v25.2"]
    env:
      CRDB_TEST_URL: postgresql://root@localhost:26257/defaultdb?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - name: Start CockroachDB
        run: |
          docker run -d --name crdb \
            -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:${{ matrix.crdb }} \
            start-single-node --insecure --accept-sql-without-tls
          for i in {1..60}; do
            if docker exec crdb /cockroach/cockroach sql --insecure -e 'SELECT 1' >/dev/null 2>&1; then
              echo "CockroachDB is up"
              break
            fi
            sleep 1
          done
          docker exec crdb /cockroach/cockroach sql --insecure -e \
            "SET CLUSTER SETTING feature.vector_index.enabled = true;"
      - name: Install package
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest --cov=llama_index --cov-report=xml --cov-fail-under=50
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
